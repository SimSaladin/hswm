verbatim:
  cabal-version:      3.4
name:               hswm-bindings
version:            0.1.0.0
license:            MIT
license-file:       LICENSE
author:             Samuli Thomasson
maintainer:         samuli.thomasson@pm.me
build-type:         Simple
extra-doc-files:    CHANGELOG.md

extra-source-files:
  - cbits/*.c
  - include/*.h
  - binding-specs/*.yaml
  - generated/*.yaml

library:
  source-dirs: src
  dependencies:
    - base ^>=4.21.0.0
    - c-expr-runtime
    - hs-bindgen-runtime
    - template-haskell
    - data-default
  include-dirs:
    - include
    - include/wayland-protocols
  c-sources:
    - cbits/*.c
    - cbits/wayland-protocols/ext-foreign-toplevel-list-v1-protocol.c
  pkgconfig-depends:
    - wayland-client
    - pixman-1
  #extra-libraries:
  #  - wayland-client
  #  - pixman-1
  ghc-options:
    - -Wall
    - -Wunused-packages
    - -haddock
    - -fPIC
  language: GHC2024
  default-extensions:
    - TemplateHaskell
    - TypeFamilies
    - OverloadedStrings
    - DuplicateRecordFields
