verbatim:
  cabal-version:      3.12
name:               hswm-bindings
version:            0.1.0.0
license:            MIT
license-file:       LICENSE
author:             Samuli Thomasson
maintainer:         samuli.thomasson@pm.me
build-type:         Custom
extra-doc-files:    CHANGELOG.md

custom-setup:
  dependencies:
    - base
    - Cabal

extra-source-files:
  - Makefile
  - protocol/*.xml
  - cbits/*.c
  - include/*.h
  - include/*/*.h
  - binding-specs/*.yaml
  - generated/*.yaml

library:
  source-dirs: src
  dependencies:
    - base ^>=4.21.0.0
    - c-expr-runtime
    - hs-bindgen-runtime
    - template-haskell
    - data-default
    - hashable
    - text
    - deepseq
    - xml-conduit
  include-dirs:
    - include
    - include/wayland-protocols
  pkgconfig-depends:
    - wayland-client
    - pixman-1
    - wayland-protocols
  ghc-options:
    - -Wall
    - -Wunused-packages
    - -fPIC
  language: GHC2024
  default-extensions:
    - TemplateHaskell
    - TypeFamilies
    - OverloadedStrings
    - DuplicateRecordFields
