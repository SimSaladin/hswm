---
verbatim:
  - cabal-version:    3.12
name:               hswm
version: &version   0.1.0.0
synopsis:           Wayland window manager for River
description:        Wayland window manager for River
license:            MIT
license-file:       LICENSE
author:             Samuli Thomasson
maintainer:         samuli.thomasson@pm.me
# copyright:
build-type:         Simple
#extra-doc-files:    README.md
#                  CHANGELOG.md
#extra-source-files:
tested-with:
  - GHC == 9.12.2

_common-language: &language
  language: GHC2024
  default-extensions:
    - RecordWildCards
    - OverloadedRecordDot
    - OverloadedLabels
    - DuplicateRecordFields
    - OverloadedStrings
    - DerivingVia
    - DeriveAnyClass
    - PackageImports
    - QuantifiedConstraints

    # https://discourse.haskell.org/t/what-are-you-supposed-to-do-about-wambiguous-fields/9545/36?page=2
_common-ghc-options: &common-ghc-options
    -Wall
    -Wunused-packages
    -Wno-partial-type-signatures
    -Wno-ambiguous-fields

_common-rts-options: &common-rts-options
    -threaded
    -rtsopts "-with-rtsopts=-maxN4 -qn2 -A8M -K64M -M1G -kc8k"


internal-libraries:
  hswm-prelude:
    <<: *language
    source-dirs: hswm-prelude
    exposed-modules:
      - HSWM.Prelude
    other-modules: []
    dependencies:
      - name: base
        version: &base-version '>=4.21.0 && < 4.23'
      - rio
      - text
      - mtl
      - data-default
      - stm
      - monad-logger-aeson
      - unliftio-core
      - unliftio
      - exceptions
      - async
    ghc-options:
      - *common-ghc-options

library:
  <<: *language
  source-dirs: src
  #exposed-modules: # discovered by hpack
  other-modules: []
  generated-other-modules:
    - PackageInfo_hswm
  #  - Paths_hswm
  dependencies:
    - rio
    - &base-noprelude
      name: base
      version: *base-version
      mixin:
        - hiding (Prelude)
    - &hswm-prelude
      name: hswm:hswm-prelude
      mixin:
        - (HSWM.Prelude as Prelude)
    - JuicyPixels ^>=3.3.9
    - aeson ^>=2.2.3
    - bytestring ^>=0.12.2
    - containers >=0.7 && <1.0
    - data-default ^>=0.8.0
    - deepseq ^>=1.5.1
    - derive-storable ^>=0.3.1
    - directory ^>=1.3.9
    - fast-logger ^>=3.2.6
    - hswm-bindings # Generated C bindings
    - mtl ^>=2.3.1
    - network ^>=3.2.8
    - optparse-generic ^>=1.5
    - optparse-applicative ^>=0.18.1
    - pretty-simple ^>=4.1.4
    - process ^>=1.6.25
    - stm ^>=2.5.3
    - text ^>=2.1.2
    - time >=1.14 && <2.0
    - transformers ^>=0.6.1
    - typed-process ^>=0.2.13
    - typerep-map ^>=0.7.0
    - unbounded-delays ^>=0.1.1
    - unix ^>=2.8.6
    - utf8-string ^>=1.0.2
    - vector ^>=0.13.2
    - xkbcommon-bindings
    - filelock ^>=0.1.1
    - pango ^>=0.13.12
  build-tools:
    - hsc2hs:hsc2hs
  ghc-options:
    - *common-ghc-options

executables:
  hswm:
    <<: *language
    main: Main.hs
    source-dirs: app
    dependencies:
      - base
      - hswm
      - hswm-bindings
      - containers
      - bytestring
    ghc-options:
      - *common-ghc-options
      - *common-rts-options

  hswmctl:
    <<: *language
    main: Main.hs
    source-dirs: app-ctl
    dependencies:
      - base
      - hswm
      - text
      - bytestring
      - time
      - haskeline
      - monad-logger-aeson
      - aeson
      - prettyprinter
      - prettyprinter-ansi-terminal
      - optparse-generic
      - optparse-applicative
    ghc-options:
      - *common-ghc-options
      - *common-rts-options
